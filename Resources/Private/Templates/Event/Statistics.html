<f:layout name="Default" />

<f:section name="main">
<div class="rescue-statistics">

    <f:if condition="{stations} && {showStationFilter}">
        <f:form action="statistics" method="post" class="rescue-statistics__station-filter">
            <label for="statistics-station" class="form-label fw-semibold">Ortsfeuerwehr</label>
            <f:form.select
                id="statistics-station"
                name="station"
                options="{stations}"
                optionValueField="uid"
                optionLabelField="name"
                value="{activeStationUid}"
                class="form-select"
                additionalAttributes="{onchange: 'this.form.submit()'}" />
            <noscript>
                <button type="submit">Filtern</button>
            </noscript>
        </f:form>
    </f:if>

    <f:if condition="{stationName}">
        <f:then><h1 class="rescue-statistics__station">Einsatzstatistik: {stationName}</h1></f:then>
        <f:else><h1 class="rescue-statistics__station">Einsatzstatistik</h1></f:else>
    </f:if>

    <f:render partial="Statistics/PieChart" arguments="{statistics: statistics}" />

    <f:if condition="{showMonthlyChart} && {monthlyStatistics.svgBarChart}">
        <div class="rescue-statistics__bar-chart">
            <h3>Monatliche Einsätze im Jahresvergleich</h3>
            <div class="rescue-statistics__bar-chart-desktop">
                <svg viewBox="{monthlyStatistics.svgBarChart.viewBox}"
                     xmlns="http://www.w3.org/2000/svg"
                     style="width:100%;max-width:1400px;height:auto;display:block;">

                    <!-- Gitterlinien + Y-Achsenbeschriftung -->
                    <f:for each="{monthlyStatistics.svgBarChart.gridLines}" as="gl">
                        <line x1="{gl.x1}" y1="{gl.y1}" x2="{gl.x2}" y2="{gl.y2}"
                              stroke="#e0e0e0" stroke-width="1"/>
                        <text x="{gl.labelX}" y="{gl.labelY}"
                              text-anchor="end" font-size="10" fill="#888">{gl.label}</text>
                    </f:for>

                    <!-- X-Achse -->
                    <line x1="{monthlyStatistics.svgBarChart.axisLeft}"
                          y1="{monthlyStatistics.svgBarChart.axisBottom}"
                          x2="{monthlyStatistics.svgBarChart.axisRight}"
                          y2="{monthlyStatistics.svgBarChart.axisBottom}"
                          stroke="#ccc" stroke-width="1"/>

                    <!-- Balken -->
                    <f:for each="{monthlyStatistics.svgBarChart.bars}" as="bar">
                        <rect class="bar"
                              x="{bar.x}" y="{bar.y}"
                              width="{bar.width}" height="{bar.height}"
                              fill="{bar.color}">
                            <title>{bar.tooltip}</title>
                        </rect>
                    </f:for>

                    <!-- Monatsbeschriftungen -->
                    <f:for each="{monthlyStatistics.svgBarChart.monthLabels}" as="ml">
                        <text x="{ml.x}" y="{ml.y}"
                              text-anchor="middle" font-size="10" fill="#555">{ml.text}</text>
                    </f:for>

                    <!-- Legende -->
                    <f:for each="{monthlyStatistics.svgBarChart.legend}" as="lg">
                        <rect x="{lg.rx}" y="{lg.ry}" width="10" height="10" fill="{lg.color}"/>
                        <text x="{lg.tx}" y="{lg.ty}" font-size="11" fill="#333">{lg.label}</text>
                    </f:for>
                </svg>
            </div>

            <div class="rescue-statistics__bar-chart-mobile">
                <f:for each="{monthlyStatistics.mobileRows}" as="row">
                    <div class="rescue-statistics__mobile-row">
                        <div class="rescue-statistics__mobile-month">{row.month}</div>
                        <f:for each="{row.values}" as="value">
                            <div class="rescue-statistics__mobile-line">
                                <span class="rescue-statistics__mobile-year">{value.year}</span>
                                <div class="rescue-statistics__mobile-track">
                                    <span class="rescue-statistics__mobile-fill"
                                          style="width:{value.percent}%;background:{value.color};"></span>
                                </div>
                                <span class="rescue-statistics__mobile-count">{value.count}</span>
                            </div>
                        </f:for>
                    </div>
                </f:for>
            </div>
        </div>
    </f:if>

</div>

</f:section>
